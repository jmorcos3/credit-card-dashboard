name: Weekly RSS Scraper

on:
  schedule:
    - cron: '0 13 * * 1'  # Mondays 9am ET (13:00 UTC)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install feedparser requests

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scrape.py

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add offers.json history/ high_signal.json
          git diff --staged --quiet || git commit -m "chore: weekly offers refresh [skip ci]"
          git push

      - name: Create digest issue if high-signal items found
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('high_signal.json', 'utf-8'));
            if (!data.items || data.items.length === 0) {
              console.log('No high-signal items, skipping issue.');
              return;
            }
            const today = new Date().toISOString().slice(0,10);
            const lines = data.items.map(i =>
              `### [${i.score}/10] ${i.title}\n` +
              `**Source:** ${i.source}${i.published ? ' · ' + new Date(i.published).toDateString() : ''}\n\n` +
              `${i.summary}\n\n` +
              `[Read more →](${i.link})\n\n---`
            );
            const body = `Weekly digest of high-signal credit card offers (score ≥ 7).\n\n` +
                         `Auto-generated by scrape.py on ${today}.\n\n---\n\n` +
                         lines.join('\n\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly Card Digest — ${today} (${data.items.length} high-signal)`,
              body: body,
              labels: ['digest']
            });
            console.log(`Created issue with ${data.items.length} items.`);
